name: digitize_art_prototype
description: MVP prototype for artwork digitization with AR overlay and edge detection
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # Internationalization (version pinned by the Flutter SDK's
  # flutter_localizations — keep flexible so it works across Flutter versions)
  intl: any
  
  # Camera
  camera: ^0.10.5+5
  
  # Permissions
  permission_handler: ^11.0.1
  
  # Image processing
  image: ^4.1.3
  
  # Edge detection with OpenCV (contour-based artwork detection)
  opencv_dart: 1.4.3

  # State management
  provider: ^6.1.1
  
  # Firebase (3.x/5.x ship a gRPC-Core that builds on recent Xcode)
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.0
  cloud_firestore: ^5.4.0
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.0
  
  # Utils
  path_provider: ^2.1.1
  path: ^1.8.3
  shared_preferences: ^2.2.2
  
  # Fonts
  google_fonts: ^6.1.0
  
  # URL launcher
  url_launcher: ^6.2.4
  gal: ^2.3.2
  cunning_document_scanner: ^1.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.1

# App launcher icon (LE LOFT logo). Generate with:
#   dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo/leloft-icon.png"
  remove_alpha_ios: true
  background_color_ios: "#FFFFFF"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/logo/leloft-icon-fg.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  
  assets:
    - assets/logo/digitize-art-logo.png
    - assets/logo/digitize-art-logo-black.png
    - assets/logo/leloft-logo.png
